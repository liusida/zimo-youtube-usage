# Deploy Server/* to ~/zimo-usage/ on the remote host (SSH user's home).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST          — e.g. your.server.example
#   SSH_USER          — login user on the server (must own ~/zimo-usage)
#   DEPLOY_SSH_KEY    — full private key (multiline). Paste the file as-is:
#                       from -----BEGIN ...----- through -----END ...-----,
#                       Unix line breaks (no literal \n text). No quotes.
#
# Host keys: populated each run via ssh-keyscan (no SSH_KNOWN_HOSTS secret).
#
# Optional:
#   SSH_PORT          — default 22
#   DEPLOY_POST_CMD   — after npm ci (e.g. systemctl --user restart zimo-usage.service)
#
# DEPLOY_NPM_BIN — path to npm on the server (same Node as systemd), e.g.
#   .../v22.18.0/bin/npm   (preferred)
#   .../v22.18.0/bin       (bin directory — workflow appends /npm for ci)
# npm ci prepends that bin dir to PATH so install scripts (node-gyp / prebuild) use Node 22, not /usr/bin/node.
# Set as secret OR variable (secret wins). Trim whitespace.
#
# npm ci runs only when Server/package.json or Server/package-lock.json changed in the push (git diff),
# or workflow_dispatch, or remote ~/zimo-usage/node_modules is missing — otherwise skipped for faster deploy.
#
# GitHub only loads workflows from .github/workflows/ (not .git/).

name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "Server/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Server dependency manifest changes
        id: deps
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "reason=workflow_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "reason=no-before-sha" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "reason=before-unavailable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${BEFORE}" "${AFTER}" | grep -qE '^Server/package\.json$|^Server/package-lock\.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "reason=manifest-touched" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "reason=manifest-unchanged" >> "$GITHUB_OUTPUT"
          fi

      - name: Add server host keys
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "${PORT}" -T 30 "${SSH_HOST}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Start ssh-agent and add deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Rsync application files to ~/zimo-usage/
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          RSYNC_RSH="ssh -p ${PORT} -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          rsync -avz \
            --delete \
            --exclude 'data/' \
            --exclude 'node_modules/' \
            -e "$RSYNC_RSH" \
            "Server/" "${SSH_USER}@${SSH_HOST}:~/zimo-usage/"

      # Shows which node/npm SSH sees — often differs from an interactive login (nvm / PATH).
      - name: Remote node/npm (PATH diagnostic)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_NPM_BIN_SECRET: ${{ secrets.DEPLOY_NPM_BIN }}
          DEPLOY_NPM_BIN_VAR: ${{ vars.DEPLOY_NPM_BIN }}
        run: |
          set -euo pipefail
          DEPLOY_NPM_BIN="${DEPLOY_NPM_BIN_SECRET:-}"
          if [ -z "$DEPLOY_NPM_BIN" ]; then DEPLOY_NPM_BIN="${DEPLOY_NPM_BIN_VAR:-}"; fi
          DEPLOY_NPM_BIN="$(printf '%s' "$DEPLOY_NPM_BIN" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          PORT="${SSH_PORT:-22}"
          SSH_BASE=(ssh -p "${PORT}" \
            -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "${SSH_USER}@${SSH_HOST}")

          node_bin_for_npm_path() {
            local p="$1"
            if [[ "$p" == */npm ]]; then printf '%s' "${p%/npm}node"; return; fi
            if [[ "$p" == */node ]]; then printf '%s' "$p"; return; fi
            printf '%s/node' "$p"
          }

          echo "::group::Default SSH remote command (non-login PATH)"
          "${SSH_BASE[@]}" 'echo "node: $(command -v node 2>/dev/null || echo none)"; echo "npm: $(command -v npm 2>/dev/null || echo none)"; node -v 2>/dev/null || true; npm -v 2>/dev/null || true'
          echo "::endgroup::"

          echo "::group::bash -lc (fallback npm ci when DEPLOY_NPM_BIN secret/var unset)"
          REMOTE_PATH_CHECK='echo "node: $(command -v node)"; echo "npm: $(command -v npm)"; node -v; npm -v'
          "${SSH_BASE[@]}" "bash -lc $(printf '%q' "$REMOTE_PATH_CHECK")"
          echo "::endgroup::"

          if [ -n "${DEPLOY_NPM_BIN:-}" ]; then
            echo "::group::DEPLOY_NPM_BIN (pinned for npm ci)"
            NPM_FOR_CI="$DEPLOY_NPM_BIN"
            [[ "$NPM_FOR_CI" == */npm ]] || NPM_FOR_CI="${NPM_FOR_CI%/}/npm"
            Q_NPM=$(printf '%q' "$NPM_FOR_CI")
            Q_NODE=$(printf '%q' "$(node_bin_for_npm_path "$DEPLOY_NPM_BIN")")
            BIN_DIR="${NPM_FOR_CI%/*}"
            Q_BIN_DIR=$(printf '%q' "$BIN_DIR")
            echo "Pinned npm: $NPM_FOR_CI"
            echo "Paired node: $(node_bin_for_npm_path "$DEPLOY_NPM_BIN")"
            "${SSH_BASE[@]}" "${Q_NPM} -v && ${Q_NODE} -v"
            echo "command -v node when PATH starts with bin (used during npm ci):"
            "${SSH_BASE[@]}" "PATH=${Q_BIN_DIR}:\$PATH command -v node && PATH=${Q_BIN_DIR}:\$PATH node -v"
            echo "::endgroup::"
          else
            echo "DEPLOY_NPM_BIN not set — npm ci uses bash -lc npm above."
          fi

      - name: Install dependencies and optional post-deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_POST_CMD: ${{ secrets.DEPLOY_POST_CMD }}
          DEPLOY_NPM_BIN_SECRET: ${{ secrets.DEPLOY_NPM_BIN }}
          DEPLOY_NPM_BIN_VAR: ${{ vars.DEPLOY_NPM_BIN }}
          DEPS_CHANGED: ${{ steps.deps.outputs.changed }}
          DEPS_REASON: ${{ steps.deps.outputs.reason }}
        run: |
          set -euo pipefail
          DEPLOY_NPM_BIN="${DEPLOY_NPM_BIN_SECRET:-}"
          if [ -z "$DEPLOY_NPM_BIN" ]; then DEPLOY_NPM_BIN="${DEPLOY_NPM_BIN_VAR:-}"; fi
          DEPLOY_NPM_BIN="$(printf '%s' "$DEPLOY_NPM_BIN" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          PORT="${SSH_PORT:-22}"
          SSH_BASE=(ssh -p "${PORT}" \
            -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "${SSH_USER}@${SSH_HOST}")

          REMOTE_HAS_MOD=$("${SSH_BASE[@]}" '[ -d "$HOME/zimo-usage/node_modules" ] && echo yes || echo no' | tr -d '\r\n')
          echo "deps_changed=${DEPS_CHANGED} (${DEPS_REASON}), remote node_modules=${REMOTE_HAS_MOD}"

          RUN_NPM_CI=0
          if [ "$REMOTE_HAS_MOD" != "yes" ]; then
            echo "Running npm ci (remote node_modules missing)"
            RUN_NPM_CI=1
          elif [ "${DEPS_CHANGED:-}" = "true" ]; then
            echo "Running npm ci (Server/package.json or package-lock.json changed)"
            RUN_NPM_CI=1
          else
            echo "Skipping npm ci — use workflow_dispatch or change manifests to force reinstall"
          fi

          if [ "$RUN_NPM_CI" -eq 1 ]; then
            if [ -n "${DEPLOY_NPM_BIN:-}" ]; then
              NPM_FOR_CI="$DEPLOY_NPM_BIN"
              [[ "$NPM_FOR_CI" == */npm ]] || NPM_FOR_CI="${NPM_FOR_CI%/}/npm"
              BIN_DIR="${NPM_FOR_CI%/*}"
              Q_NPM=$(printf '%q' "$NPM_FOR_CI")
              Q_BIN_DIR=$(printf '%q' "$BIN_DIR")
              "${SSH_BASE[@]}" "cd \$HOME/zimo-usage && PATH=${Q_BIN_DIR}:\$PATH ${Q_NPM} ci --omit=dev"
            else
              echo "::warning title=Set DEPLOY_NPM_BIN::Native deps (e.g. better-sqlite3) need the same Node as systemd. Add secret or variable DEPLOY_NPM_BIN = full path to npm (see workflow comments)."
              "${SSH_BASE[@]}" "bash -lc \"cd \$HOME/zimo-usage && npm ci --omit=dev\""
            fi
          fi

          if [ -n "${DEPLOY_POST_CMD:-}" ]; then
            "${SSH_BASE[@]}" "bash -lc $(printf '%q' "$DEPLOY_POST_CMD")"
          fi
