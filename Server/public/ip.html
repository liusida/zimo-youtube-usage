<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch IP Manager</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 24px;
            color: #222;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 28px;
            font-weight: 600;
        }

        .subtitle {
            margin-bottom: 20px;
            color: #666;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            border: 0;
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }

        .btn-delete {
            display: none;
            background: #ef4444;
            color: #fff;
            padding: 6px 10px;
            font-size: 13px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 14px;
        }

        .btn-link {
            background: #e5e7eb;
            color: #111827;
            text-decoration: none;
            display: inline-block;
        }

        .status {
            min-height: 20px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .status.ok {
            color: #166534;
        }

        .status.err {
            color: #b91c1c;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: #fafafa;
        }

        .empty {
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Watch IP Manager</h1>
        <div class="subtitle">Add IPv4 addresses or patterns (<code>*</code> = any octet, e.g. <code>210.10.78.*</code>) to highlight matching usage dots in orange on the main chart.</div>

        <form id="ipForm">
            <input id="ipInput" type="text" placeholder="e.g. 210.10.78.77 or 210.10.78.*" autocomplete="off">
            <button class="btn-primary" type="submit">Add</button>
        </form>

        <div id="status" class="status"></div>

        <div class="actions">
            <button id="refreshBtn" class="btn-link">Refresh List</button>
            <a class="btn-link" href="/">Back to Usage Page</a>
        </div>

        <ul id="ipList"></ul>
        <div id="emptyState" class="empty" style="display:none;">No watch IPs yet.</div>
    </div>

    <script>
        const ipForm = document.getElementById('ipForm');
        const ipInput = document.getElementById('ipInput');
        const ipList = document.getElementById('ipList');
        const emptyState = document.getElementById('emptyState');
        const statusEl = document.getElementById('status');
        const refreshBtn = document.getElementById('refreshBtn');

        function setStatus(message, isError = false) {
            statusEl.textContent = message || '';
            statusEl.className = `status ${isError ? 'err' : 'ok'}`;
        }

        /** Same rules as server: four parts, each * or 0–255 */
        function isValidWatchEntry(s) {
            const segs = s.trim().split('.');
            if (segs.length !== 4) return false;
            for (const seg of segs) {
                if (seg === '*') continue;
                if (!/^\d{1,3}$/.test(seg)) return false;
                const n = Number(seg);
                if (!Number.isInteger(n) || n < 0 || n > 255) return false;
            }
            return true;
        }

        async function loadIps() {
            setStatus('');
            try {
                const res = await fetch('/zimo-usage/watch-ips');
                const payload = await res.json();
                const ips = Array.isArray(payload.data) ? payload.data : [];

                ipList.innerHTML = '';
                emptyState.style.display = ips.length ? 'none' : 'block';

                ips.forEach(ip => {
                    const li = document.createElement('li');
                    const text = document.createElement('span');
                    text.textContent = ip;

                    const del = document.createElement('button');
                    del.className = 'btn-delete';
                    del.textContent = 'Delete';
                    del.addEventListener('click', async () => {
                        await deleteIp(ip);
                    });

                    li.appendChild(text);
                    li.appendChild(del);
                    ipList.appendChild(li);
                });
            } catch (err) {
                setStatus('Failed to load IP list.', true);
            }
        }

        async function addIp(ip) {
            const res = await fetch('/zimo-usage/watch-ips', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip })
            });
            const payload = await res.json();
            if (!res.ok) {
                throw new Error(payload.error || 'Failed to add IP.');
            }
            return payload;
        }

        async function deleteIp(ip) {
            try {
                const res = await fetch(`/zimo-usage/watch-ips/${encodeURIComponent(ip)}`, {
                    method: 'DELETE'
                });
                const payload = await res.json();
                if (!res.ok) {
                    throw new Error(payload.error || 'Failed to delete IP.');
                }
                setStatus(`Deleted ${ip}`);
                await loadIps();
            } catch (err) {
                setStatus(err.message || 'Delete failed.', true);
            }
        }

        ipForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const ip = ipInput.value.trim();
            if (!isValidWatchEntry(ip)) {
                setStatus('Use IPv4 or a pattern: four parts, each * or 0–255 (e.g. 210.10.78.*).', true);
                return;
            }

            try {
                await addIp(ip);
                ipInput.value = '';
                setStatus(`Added ${ip}`);
                await loadIps();
            } catch (err) {
                setStatus(err.message || 'Add failed.', true);
            }
        });

        refreshBtn.addEventListener('click', async () => {
            await loadIps();
        });

        loadIps();
    </script>
</body>
</html>
